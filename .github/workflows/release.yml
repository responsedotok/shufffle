name: Release NPM Package Version
on:
  push:
    tags: 
    - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
   
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Publish
        run: npm publish --access public --provenance
